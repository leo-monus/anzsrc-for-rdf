name: validate

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Byte-compile scripts
        run: python -m py_compile anzsrc_for_to_rdf.py validate_rdf.py

      - name: Converter smoke test
        run: python anzsrc_for_to_rdf.py --help

      - name: Validate RDF/XML output
        run: python validate_rdf.py --rdf output/anzsrc-for_2020.rdf

      - name: Validate Turtle output
        run: python validate_rdf.py --rdf output/anzsrc-for_2020.ttl --format turtle
